name: triage

on:
  issues:
    types: [opened]

jobs:
  triage:
    if: github.repository == 'Devil-Org/devilcode'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup Devil
        uses: ./.github/actions/setup-devil

      - name: Triage issue
        env:
          DEVIL_API_KEY: ${{ secrets.DEVIL_API_KEY }}
          DEVIL_ORG_ID: ${{ secrets.DEVIL_ORG_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          devil run --agent triage "The following issue was just opened, triage it:

          Title: $ISSUE_TITLE

          $ISSUE_BODY"
