name: integration-test

on:
  workflow_dispatch: # manual trigger for pre-release
  schedule:
    - cron: "0 3 * * 1-5" # weekday nightlies at 03:00 UTC
  push:
    branches:
      - mark/integration-tests # TODO: remove after initial validation

jobs:
  integration:
    name: integration tests
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      # Build the CLI binary (needed for all levels)
      - name: Build CLI
        run: bun run build
        working-directory: packages/opencode

      # Build the extension (esbuild bundle + copy CLI binary to bin/)
      - name: Compile extension
        run: bun run compile
        working-directory: packages/kilo-vscode

      # Level 1: Extension activation in real VS Code
      # Compile tests separately (tsconfig.test.json), then run vscode-test directly
      # (skipping pretest which would redundantly recompile)
      - name: Compile activation tests
        run: bun run compile-tests
        working-directory: packages/kilo-vscode

      - name: Extension activation tests
        run: xvfb-run -a ./node_modules/.bin/vscode-test
        working-directory: packages/kilo-vscode

      # Levels 2 + 3: CLI backend + mock LLM (standalone bun tests)
      - name: CLI integration tests
        run: bun test tests/integration/
        working-directory: packages/kilo-vscode
