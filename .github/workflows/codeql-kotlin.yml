# kilocode_change - new file
name: "CodeQL Kotlin"

on:
  push:
    branches: ["main"]
    paths:
      - "packages/kilo-jetbrains/**"
      - ".github/workflows/codeql-kotlin.yml"
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "29 10 * * 5"
  workflow_dispatch:

jobs:
  check-paths:
    name: Check Kotlin changed paths
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      matched: ${{ steps.filter.outputs.matched }}
    steps:
      - name: Check changed files
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          matched=false
          while IFS= read -r file; do
            case "$file" in
              packages/kilo-jetbrains/*|.github/workflows/codeql-kotlin.yml)
                matched=true
                break
                ;;
            esac
          done < <(gh api --paginate "repos/${GITHUB_REPOSITORY}/pulls/${PR}/files" --jq '.[].filename')
          echo "matched=$matched" >> "$GITHUB_OUTPUT"
          echo "matched=$matched"

  analyze:
    needs: check-paths
    if: always() && (needs.check-paths.result == 'skipped' || needs.check-paths.outputs.matched == 'true')
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build Java/Kotlin
        shell: bash
        run: ./gradlew typecheck --rerun-tasks --no-build-cache
        working-directory: packages/kilo-jetbrains

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
