name: typecheck

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6 # kilocode_change
        # kilocode_change start
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

        # kilocode_change end
      # kilocode_change start
      - name: Warn on missing changeset
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bun run script/check-changeset.ts --base "$BASE_SHA"

      # kilocode_change end
      - name: Run typecheck
        run: bun typecheck
