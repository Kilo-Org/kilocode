name: test-vscode

on:
  push:
    branches:
      - dev
    paths:
      - "packages/devil-vscode/**"
      - "packages/ui/**"
      - "packages/devil-ui/**"
  pull_request:
    paths:
      - "packages/devil-vscode/**"
      - "packages/ui/**"
      - "packages/devil-ui/**"
  workflow_dispatch:

env:
  BUN_TEST_TIMEOUT: 120000
  FORCE_COLOR: 1

env:
  BUN_TEST_TIMEOUT: 120000
  FORCE_COLOR: 1

jobs:
  unit:
    name: unit tests
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Run unit tests
        working-directory: packages/devil-vscode
        run: bun run test:unit -- --user-data-dir=/tmp/vscode-test-data --extensions-dir=/tmp/vscode-test-ext -- --user-data-dir=/tmp/vscode-test-data --extensions-dir=/tmp/vscode-test-ext -- --user-data-dir=/tmp/vscode-test-data --extensions-dir=/tmp/vscode-test-ext -- --user-data-dir=/tmp/vscode-test-data --extensions-dir=/tmp/vscode-test-ext

      - name: Check formatting (prettier)
        working-directory: packages/devil-vscode
        run: bun run format:check

      - name: Check for dead code (knip)
        working-directory: packages/devil-vscode
        run: bun run knip

      - name: Check for devilcode_change markers
        working-directory: packages/devil-vscode
        run: bun run check-devilcode-change
