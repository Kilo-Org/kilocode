name: test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  # Keep every run on main so cancelled checks do not pollute the default branch
  # commit history. PRs and other branches still share a group and cancel stale runs.
  group: ${{ case(github.ref == 'refs/heads/main', format('{0}-{1}', github.workflow, github.run_id), format('{0}-{1}', github.workflow, github.event.pull_request.number || github.ref)) }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # kilocode_change start
  unit:
    name: unit (${{ matrix.settings.name }})
    strategy:
      fail-fast: false
      matrix:
        settings:
          - name: linux
            host: blacksmith-4vcpu-ubuntu-2404 # kilocode_change
          - name: macos
            host: macos-15 # kilocode_change
          - name: windows
            host: blacksmith-4vcpu-windows-2025 # kilocode_change
    runs-on: ${{ matrix.settings.host }}
    timeout-minutes: 45 # kilocode_change
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6 # kilocode_change
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # kilocode_change start
      - name: Setup Node
        id: setup-node
        continue-on-error: ${{ runner.os == 'Windows' }}
        uses: actions/setup-node@v6 # kilocode_change
        with:
          node-version: "24"

      - name: Retry Setup Node on Windows
        if: runner.os == 'Windows' && steps.setup-node.outcome == 'failure'
        uses: actions/setup-node@v6
        with:
          node-version: "24"
      # kilocode_change end

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup Zig
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP "zig-0.16.0.zip"
          $target = Join-Path $env:RUNNER_TEMP "zig-0.16.0"
          Invoke-WebRequest "https://ziglang.org/download/0.16.0/zig-x86_64-windows-0.16.0.zip" -OutFile $archive
          $actual = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          $expected = "68659eb5f1e4eb1437a722f1dd889c5a322c9954607f5edcf337bc3684a75a7e"
          if ($actual -ne $expected) { throw "Unexpected Zig archive checksum: $actual" }
          Expand-Archive $archive -DestinationPath $target
          Add-Content $env:GITHUB_PATH (Join-Path $target "zig-x86_64-windows-0.16.0")

      - name: Build Windows sandbox helpers
        if: runner.os == 'Windows'
        working-directory: packages/kilo-sandbox/windows
        run: |
          zig build test
          zig build -Dtarget=x86_64-windows-gnu -Doptimize=Debug --prefix dist/windows-x64
          zig build -Dtarget=aarch64-windows-gnu -Doptimize=Debug --prefix dist/windows-arm64
          echo "KILO_WINDOWS_SANDBOX_HELPER=$(cygpath -w "$PWD/dist/windows-x64/bin/kilo-sandbox-windows.exe")" >> "$GITHUB_ENV"
          echo "KILO_WINDOWS_SANDBOX_PROTOTYPE=1" >> "$GITHUB_ENV"
          echo "NODE_ENV=test" >> "$GITHUB_ENV"

      - name: Run Windows sandbox kernel test
        if: runner.os == 'Windows'
        working-directory: packages/kilo-sandbox
        run: bun test test/windows.integration.test.ts --timeout 30000

      - name: Configure git identity
        run: |
          git config --global user.email "kilo-maintainer[bot]@users.noreply.github.com"
          git config --global user.name "kilo-maintainer[bot]"

      - name: Cache Turbo
        uses: actions/cache@v5 # kilocode_change
        with:
          path: node_modules/.cache/turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('turbo.json', '**/package.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('turbo.json', '**/package.json') }}-
            turbo-${{ runner.os }}-

      - name: Run unit tests
        run: bun turbo test:ci --filter='!@kilocode/kilo-jetbrains'
        env:
          KILO_EXPERIMENTAL_DISABLE_FILEWATCHER: ${{ runner.os == 'Windows' && 'true' || 'false' }}
          KILO_TEST_PROFILE: ${{ runner.os == 'macOS' && github.event_name == 'pull_request' && 'darwin' || '' }} # kilocode_change

      - name: Run HttpApi exerciser gates
        if: runner.os == 'Linux' # kilocode_change
        working-directory: packages/opencode
        run: bun run test:httpapi

      - name: Publish unit reports
        if: always()
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6.4.0
        with:
          report_paths: packages/*/.artifacts/unit/junit.xml
          check_name: "unit results (${{ matrix.settings.name }})"
          detailed_summary: true
          include_time_in_summary: true
          fail_on_failure: false

      - name: Upload unit artifacts
        if: always()
        uses: actions/upload-artifact@v7 # kilocode_change
        with:
          name: unit-${{ matrix.settings.name }}-${{ github.run_attempt }}
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 7
          path: packages/*/.artifacts/unit/junit.xml

      - name: Upload Windows sandbox comparison helpers
        if: runner.os == 'Windows' && always()
        uses: actions/upload-artifact@v7
        with:
          name: zig-windows-sandbox-${{ github.sha }}-${{ github.run_attempt }}
          retention-days: 7
          path: |
            packages/kilo-sandbox/windows/dist/windows-x64/bin/kilo-sandbox-windows.exe
            packages/kilo-sandbox/windows/dist/windows-arm64/bin/kilo-sandbox-windows.exe
  # kilocode_change end

  # kilocode_change start
  jetbrains:
    name: jetbrains
    permissions:
      contents: read
      checks: write
      pull-requests: read
    uses: ./.github/workflows/test-jetbrains.yml
  # kilocode_change end

  # kilocode_change start
  required:
    name: test (linux)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs:
      - unit
      - jetbrains
    if: always()
    steps:
      - name: Verify upstream test jobs passed
        run: |
          echo "unit=${{ needs.unit.result }}"
          echo "jetbrains=${{ needs.jetbrains.result }}"
          test "${{ needs.unit.result }}" = "success"
          test "${{ needs.jetbrains.result }}" = "success"
  # kilocode_change end
