name: test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  # Keep every run on main so cancelled checks do not pollute the default branch
  # commit history. PRs and other branches still share a group and cancel stale runs.
  group: ${{ case(github.ref == 'refs/heads/main', format('{0}-{1}', github.workflow, github.run_id), format('{0}-{1}', github.workflow, github.event.pull_request.number || github.ref)) }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit:
    name: unit (${{ matrix.settings.name }})
    # kilocode_change start
    permissions:
      contents: read
      checks: write
      id-token: write # authenticate test-result uploads without a stored secret
    # kilocode_change end
    strategy:
      fail-fast: false
      matrix:
        settings:
          - name: linux
            host: blacksmith-4vcpu-ubuntu-2404 # kilocode_change
          - name: windows
            host: blacksmith-4vcpu-windows-2025 # kilocode_change
    runs-on: ${{ matrix.settings.host }}
    timeout-minutes: 45 # kilocode_change
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6 # kilocode_change
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # kilocode_change start
      - name: Setup Node
        id: setup-node
        continue-on-error: ${{ runner.os == 'Windows' }}
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Retry Setup Node on Windows
        if: runner.os == 'Windows' && steps.setup-node.outcome == 'failure'
        uses: actions/setup-node@v6
        with:
          node-version: "24"
      # kilocode_change end

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Configure git identity
        run: |
          git config --global user.email "kilo-maintainer[bot]@users.noreply.github.com"
          git config --global user.name "kilo-maintainer[bot]"

      - name: Cache Turbo
        uses: actions/cache@v5 # kilocode_change
        with:
          path: node_modules/.cache/turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('turbo.json', '**/package.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('turbo.json', '**/package.json') }}-
            turbo-${{ runner.os }}-

      - name: Run unit tests
        run: bun turbo test:ci --filter='!@kilocode/kilo-jetbrains'
        env:
          KILO_EXPERIMENTAL_DISABLE_FILEWATCHER: ${{ runner.os == 'Windows' && 'true' || 'false' }}

      - name: Run HttpApi exerciser gates
        if: runner.os == 'Linux'
        working-directory: packages/opencode
        run: bun run test:httpapi

      - name: Publish unit reports
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: packages/*/.artifacts/unit/junit.xml
          check_name: "unit results (${{ matrix.settings.name }})"
          detailed_summary: true
          include_time_in_summary: true
          fail_on_failure: false

      # kilocode_change start
      - name: Prepare test health reports
        if: ${{ !cancelled() && hashFiles('packages/*/.artifacts/unit/junit.xml') != '' }}
        run: |
          rm -rf .artifacts/codecov-test-results
          mkdir -p .artifacts/codecov-test-results
          for report in packages/*/.artifacts/unit/junit.xml; do
            package="${report#packages/}"
            package="${package%%/*}"
            cp "$report" ".artifacts/codecov-test-results/$package.xml"
          done
          if test -f packages/opencode/.artifacts/test-health/junit.xml; then
            cp packages/opencode/.artifacts/test-health/junit.xml .artifacts/codecov-test-results/opencode.xml
          fi

      - name: Upload test health to Codecov
        id: codecov
        if: ${{ !cancelled() && hashFiles('.artifacts/codecov-test-results/*.xml') != '' }}
        continue-on-error: true
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          report_type: test_results
          files: .artifacts/codecov-test-results/*.xml
          disable_search: true
          disable_telem: true
          flags: unit-${{ matrix.settings.name }}
          name: unit-${{ matrix.settings.name }}
          os: ${{ matrix.settings.name }}
          version: v11.2.8
          fail_ci_if_error: true

      - name: Warn when Codecov upload fails
        if: ${{ !cancelled() && steps.codecov.outcome == 'failure' }}
        run: echo "::warning title=Codecov test health upload failed::Check that Kilo-Org/kilocode is activated in Codecov and inspect the previous step."
      # kilocode_change end

      - name: Upload unit artifacts
        if: always()
        uses: actions/upload-artifact@v7 # kilocode_change
        with:
          name: unit-${{ matrix.settings.name }}-${{ github.run_attempt }}
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 7
          # kilocode_change start
          path: |
            packages/*/.artifacts/unit/junit.xml
            packages/opencode/.artifacts/test-health/junit.xml
          # kilocode_change end

  # kilocode_change start
  jetbrains:
    name: jetbrains
    permissions:
      contents: read
      checks: write
      id-token: write
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run JetBrains unit tests
        run: bun script/test-ci.ts
        working-directory: packages/kilo-jetbrains

      - name: Publish JetBrains unit reports
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: packages/kilo-jetbrains/.artifacts/unit/junit.xml
          check_name: "unit results (jetbrains)"
          detailed_summary: true
          include_time_in_summary: true
          fail_on_failure: false

      - name: Upload JetBrains test health to Codecov
        id: codecov
        if: ${{ !cancelled() && hashFiles('packages/kilo-jetbrains/.artifacts/unit/junit.xml') != '' }}
        continue-on-error: true
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          report_type: test_results
          files: packages/kilo-jetbrains/.artifacts/unit/junit.xml
          disable_search: true
          disable_telem: true
          flags: jetbrains-linux
          name: jetbrains-linux
          os: linux
          version: v11.2.8
          fail_ci_if_error: true

      - name: Warn when Codecov upload fails
        if: ${{ !cancelled() && steps.codecov.outcome == 'failure' }}
        run: echo "::warning title=Codecov test health upload failed::Check that Kilo-Org/kilocode is activated in Codecov and inspect the previous step."

      - name: Upload JetBrains unit artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-jetbrains-${{ github.run_attempt }}
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 7
          path: packages/kilo-jetbrains/.artifacts/unit/junit.xml
  # kilocode_change end

  required:
    name: test (linux)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs:
      - unit
      - jetbrains
    if: always()
    steps:
      - name: Verify upstream test jobs passed
        run: |
          echo "unit=${{ needs.unit.result }}"
          echo "jetbrains=${{ needs.jetbrains.result }}"
          test "${{ needs.unit.result }}" = "success"
          test "${{ needs.jetbrains.result }}" = "success"
