name: test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
jobs:
  # devilcode_change start
  unit-linux:
    name: unit (linux)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      result: ${{ steps.result.outputs.result }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Configure git identity
        run: |
          git config --global user.email "bot@opencode.ai"
          git config --global user.name "opencode"

      - name: Run unit tests
        id: test
        run: bun turbo test

      - name: Record unit result
        if: always()
        id: result
        run: |
          echo "test=${{ steps.test.outcome }}"
          if [ "${{ steps.test.outcome }}" = "success" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "result=failure" >> "$GITHUB_OUTPUT"

  unit-windows:
    name: unit (windows)
    runs-on: blacksmith-4vcpu-windows-2025
    outputs:
      result: ${{ steps.result.outputs.result }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Configure git identity
        run: |
          git config --global user.email "bot@opencode.ai"
          git config --global user.name "opencode"

      - name: Run unit tests
        id: test
        run: bun turbo test

      - name: Record unit result
        if: always()
        id: result
        run: |
          echo "test=${{ steps.test.outcome }}"
          if [ "${{ steps.test.outcome }}" = "success" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "result=failure" >> "$GITHUB_OUTPUT"
  # devilcode_change end
  e2e:
    # devilcode_change - disabled: packages/app is not actively maintained
    if: false
    name: e2e (${{ matrix.settings.name }})
    needs:
      # devilcode_change start
      - unit-linux
      - unit-windows
      # devilcode_change end
    strategy:
      fail-fast: false
      matrix:
        settings:
          - name: linux
            host: blacksmith-4vcpu-ubuntu-2404
            playwright: bunx playwright install --with-deps
          - name: windows
            host: blacksmith-4vcpu-windows-2025
            playwright: bunx playwright install
    runs-on: ${{ matrix.settings.host }}
    env:
      PLAYWRIGHT_BROWSERS_PATH: 0
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install Playwright browsers
        working-directory: packages/app
        run: ${{ matrix.settings.playwright }}

      - name: Run app e2e tests
        run: bun --cwd packages/app test:e2e:local
        env:
          CI: true
          # devilcode_change start
          DEVIL_API_KEY: ${{ secrets.DEVIL_API_KEY }}
          DEVIL_ORG_ID: ${{ secrets.DEVIL_ORG_ID }}
          DEVIL_DISABLE_SHARE: "true"
          DEVIL_DISABLE_SESSION_INGEST: "true"
          # devilcode_change end
        timeout-minutes: 30

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.settings.name }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            packages/app/e2e/test-results
            packages/app/e2e/playwright-report

  required:
    name: test (linux)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs:
      # devilcode_change start
      - unit-linux
      - unit-windows
      # devilcode_change end
    if: always()
    steps:
      - name: Verify upstream test jobs passed
        run: |
          # devilcode_change start
          echo "unit-linux-job=${{ needs.unit-linux.result }}"
          echo "unit-linux-test=${{ needs.unit-linux.outputs.result }}"
          echo "unit-windows-job=${{ needs.unit-windows.result }}"
          echo "unit-windows-test=${{ needs.unit-windows.outputs.result }}"
          test "${{ needs.unit-linux.outputs.result }}" = "success"
          test "${{ needs.unit-windows.outputs.result }}" = "success"
          # devilcode_change end
