name: "Setup Bun"
description: "Setup Bun with caching and install dependencies"
inputs:
  install-flags:
    description: "Additional flags to pass to 'bun install'"
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    # kilocode_change start - pin the Rust Bun canary by immutable upstream revision.
    - name: Get Bun download URL
      id: bun-url
      shell: bash
      run: |
        REVISION=$(node -p "require('./package.json').config.bunRevision")
        case "$RUNNER_OS" in
          macOS)   OS=darwin ;;
          Linux)   OS=linux ;;
          Windows) OS=windows ;;
        esac
        case "$RUNNER_ARCH" in
          X64)   ARCH=x64-baseline ;;
          ARM64) ARCH=aarch64 ;;
        esac
        echo "revision=${REVISION}" >> "$GITHUB_OUTPUT"
        echo "url=https://pub-5e11e972747a44bf9aaf9394f185a982.r2.dev/releases/${REVISION}-canary/bun-${OS}-${ARCH}.zip" >> "$GITHUB_OUTPUT"

    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-download-url: ${{ steps.bun-url.outputs.url }}

    - name: Verify Bun revision
      shell: bash
      env:
        EXPECTED_REVISION: ${{ steps.bun-url.outputs.revision }}
      run: test "$(bun -e 'process.stdout.write(Bun.revision)')" = "$EXPECTED_REVISION"
    # kilocode_change end

    - name: Get cache directory
      id: cache
      shell: bash
      run: echo "dir=$(bun pm cache)" >> "$GITHUB_OUTPUT"

    - name: Restore Bun dependencies
      id: bun-cache
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ${{ steps.cache.outputs.dir }}
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install setuptools for distutils compatibility
      run: python3 -m pip install setuptools || pip install setuptools || true
      shell: bash

    - name: Install dependencies
      run: |
        # Workaround for patched peer variants
        # e.g. ./patches/ for standard-openapi
        # https://github.com/oven-sh/bun/issues/28147
        if [ "$RUNNER_OS" = "Windows" ]; then
          bun install --linker hoisted ${{ inputs.install-flags }}
        else
          bun install ${{ inputs.install-flags }}
        fi
      shell: bash

    - name: Save Bun dependencies
      if: steps.bun-cache.outputs.cache-hit != 'true' && github.event_name != 'pull_request' && github.event_name != 'pull_request_target'
      uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ${{ steps.cache.outputs.dir }}
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
