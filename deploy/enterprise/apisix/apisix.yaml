routes:
  - id: kilo-engine
    uri: /kilo/*
    methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    upstream:
      type: roundrobin
      nodes:
        "enterprise-bridge:8080": 1
      timeout:
        connect: 10
        send: 300
        read: 300
    plugins:
      proxy-rewrite:
        regex_uri:
          - "^/kilo/(.*)"
          - "/$1"
      response-rewrite:
        headers:
          set:
            X-Accel-Buffering: "no"
      limit-count:
        count: 100
        time_window: 60
        rejected_code: 429
        key_type: var
        key: remote_addr
        policy: local
      file-logger:
        path: /usr/local/apisix/logs/enterprise-audit.log
    # SSE: disable buffering via plugin metadata where supported;
    # for nginx upstream, set via custom nginx snippet in production.
  - id: license-verify
    uri: /api/v1/license/*
    methods:
      - GET
      - POST
    upstream:
      type: roundrobin
      nodes:
        "license-mock:19090": 1

#END
