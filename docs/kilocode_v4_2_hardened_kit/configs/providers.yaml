providers:
  claude:
    role: planning
    api_env: ANTHROPIC_API_KEY
    api_base: "https://api.anthropic.com/v1"
    supports: [contract, architecture, audit, release_verdict]
    fallback: siliconflow
  # MiniMax: standard always-on execution provider
  minimax:
    role: execution
    availability: always_on
    api_env: MINIMAX_API_KEY
    api_base: "https://api.minimax.chat/v1"
    supports: [execution, worker, bulk_ops]
    fallback: siliconflow
    note: "MiniMax is the always-on standard execution provider"
  siliconflow:
    role: fallback
    api_env: SILICONFLOW_API_KEY
    api_base: "https://api.siliconflow.com/v1"  # Dashboard: cloud.siliconflow.com/me/account/ak
    supports: [fallback, overflow, alternate_models]
    fallback: null
  ollama:
    role: local
    api_env: null
    api_base: "http://localhost:11434"
    supports: [local_private, memory_check, helper]
    fallback: lm_studio
  lm_studio:
    role: local
    api_env: null
    api_base: "http://localhost:1234"
    supports: [local_private, helper]
    fallback: ollama
