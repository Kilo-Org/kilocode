workstation:
  name: dave-main-workstation

  hardware:
    motherboard: MSI_MEG_X570S_ACE_MAX
    platform: AMD_AM4
    chipset: X570
    cpu_class: high_end_desktop   # Ryzen 5000 series on AM4
    ram_gb: 128                   # DDR4
    gpu:
      model: RTX_3090_Ti
      vram_gb: 24
      pcie: gen4
    storage:
      type: NVMe
      capacity_tb: 4
      nvme_slots: 4
      sata_ports: 8

  environment:
    os: windows
    supports_docker: true
    supports_wsl: true

  paths:
    workspace: "G:\\Github"
    downloads: "C:\\Users\\Admin\\Downloads\\VPS"
    models: "C:\\Users\\Admin\\.lmstudio\\models"
    lora_root: "G:\\LoRAs"
    comfyui_models: "G:\\ComfyUI\\models"
    ollama_models: "C:\\Users\\Admin\\.ollama\\models"

  local_ai:
    lm_studio:
      enabled: true
      api_base: "http://localhost:1234"
      models_path: "C:\\Users\\Admin\\.lmstudio\\models"

    ollama:
      enabled: true
      api_base: "http://localhost:11434"
      models_path: "C:\\Users\\Admin\\.ollama\\models"

  # ── Model Library ──────────────────────────────
  # Full inventory of local model assets across all drives.
  # Both LM Studio and Ollama can serve these. New models
  # can be downloaded via either tool. LoRAs, ComfyUI,
  # and media models are standalone on G:\.
  model_library:
    total_estimated_size_gb: 800

    lm_studio:
      path: "C:\\Users\\Admin\\.lmstudio\\models"
      estimated_size_gb: 700
      description: "LM Studio model library — LLMs, chat, code, instruct"
      downloadable: true

    ollama:
      path: "C:\\Users\\Admin\\.ollama\\models"
      estimated_size_gb: 20
      description: "Ollama pulled models for local inference"
      downloadable: true

    lora:
      path: "G:\\LoRAs"
      estimated_size_gb: 10
      description: "LoRA adapters for fine-tuning and model customization"

    comfyui:
      path: "G:\\ComfyUI\\models"
      estimated_size_gb: 30
      description: "ComfyUI models — checkpoints, VAE, ControlNet, upscalers, embeddings"

    tts:
      path: "G:\\Models\\TTS"
      estimated_size_gb: 5
      description: "Text-to-speech models (Bark, XTTS, Coqui, etc.)"

    stt:
      path: "G:\\Models\\STT"
      estimated_size_gb: 3
      description: "Speech-to-text / transcription models (Whisper, etc.)"

    image:
      path: "G:\\Models\\Image"
      estimated_size_gb: 15
      description: "Image generation models (Stable Diffusion, SDXL, Flux, etc.)"

    video:
      path: "G:\\Models\\Video"
      estimated_size_gb: 10
      description: "Video generation and processing models"

    music:
      path: "G:\\Models\\Music"
      estimated_size_gb: 3
      description: "Music generation models (AudioCraft, MusicGen, etc.)"

    voice_clone:
      path: "G:\\Models\\Voice"
      estimated_size_gb: 2
      description: "Voice cloning and voice conversion models (RVC, etc.)"

  capabilities:
    can_run_large_models: true
    max_context_estimate: 128k
    supports_local_training: true
    supports_parallel_agents: true

  routing_preferences:
    prefer_local_for:
      - memory_tasks
      - embeddings
      - small_generation
      - private_data_tasks
      - tts_local
      - stt_local
      - image_generation

    prefer_cloud_for:
      - large_planning
      - contract_generation
      - high_parallel_execution

  ecosystem:
    vps_host: daveai.tech
    hermes_channels: [telegram, discord]
    external_tools: [windsurf, claude_desktop]

  limits:
    max_parallel_jobs: 4
    max_gpu_jobs: 1
    max_memory_per_job_gb: 48
    max_gpu_memory_mb: 24576  # Full RTX 3090 Ti
    max_training_time_ms: 86400000  # 24 hours
