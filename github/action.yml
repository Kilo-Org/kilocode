name: "Devil GitHub Action"
description: "Run Devil AI agent in GitHub Actions workflows"
branding:
  icon: "code"
  color: "gray-dark"

inputs:
  model:
    description: "Model to use"
    required: true

  agent:
    description: "Agent to use. Must be a primary agent. Falls back to default_agent from config or 'build' if not found."
    required: false

  share:
    description: "Share the Devil session (defaults to true for public repos)"
    required: false

  prompt:
    description: "Custom prompt to override the default prompt"
    required: false

  use_github_token:
    description: "Use GITHUB_TOKEN directly instead of Devil App token exchange. When true, skips OIDC and uses the GITHUB_TOKEN env var."
    required: false
    default: "false"

  mentions:
    description: "Comma-separated list of trigger phrases (case-insensitive). Defaults to '/devil,/dc'"
    required: false

  variant:
    description: "Model variant for provider-specific reasoning effort (e.g., high, max, minimal)"
    required: false

  oidc_base_url:
    description: "Base URL for OIDC token exchange API. Only required when running a custom GitHub App install. Defaults to https://api.devil.ai"
    required: false

  devil_api_key:
    description: "Devil API key for gateway authentication"
    required: false

  devil_org_id:
    description: "Devil organization ID"
    required: false

runs:
  using: "composite"
  steps:
    - name: Get Devil version
      id: version
      shell: bash
      run: |
        VERSION=$(curl -sf https://api.github.com/repos/Devil-Org/devilcode/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
        echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

    - name: Cache Devil
      id: cache
      uses: actions/cache@v4
      with:
        path: ~/.devil/bin
        key: devil-${{ runner.os }}-${{ runner.arch }}-${{ steps.version.outputs.version }}

    - name: Install Devil
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: curl -fsSL https://devil.ai/cli/install | bash

    - name: Add Devil to PATH
      shell: bash
      run: echo "$HOME/.devil/bin" >> $GITHUB_PATH

    - name: Run Devil
      shell: bash
      id: run_devil
      run: devil github run
      env:
        MODEL: ${{ inputs.model }}
        AGENT: ${{ inputs.agent }}
        SHARE: ${{ inputs.share }}
        PROMPT: ${{ inputs.prompt }}
        USE_GITHUB_TOKEN: ${{ inputs.use_github_token }}
        MENTIONS: ${{ inputs.mentions }}
        VARIANT: ${{ inputs.variant }}
        OIDC_BASE_URL: ${{ inputs.oidc_base_url }}
        DEVIL_API_KEY: ${{ inputs.devil_api_key }}
        DEVIL_ORG_ID: ${{ inputs.devil_org_id }}
